name: Git Auto Format & Commit

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  format-and-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Linters & Formatter
        run: |
          npm run lint -- --fix || true

      - name: Auto-Commit Changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "style(lint): automated code formatting & visual standard updates [skip ci]"
          commit_user_name: "git-auto-bot"
          commit_user_email: "bot@gitauto.ai"
          commit_author: "git-auto-bot <bot@gitauto.ai>"
